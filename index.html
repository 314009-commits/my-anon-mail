<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>匿名信箱</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f7f6;
    min-height:100vh;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.mailbox-container{
    width:100%;
    max-width:500px;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
    box-sizing:border-box;
}

h2{
    text-align:center;
}

input,
textarea{
    width:100%;
    padding:12px;
    font-size:16px;
    box-sizing:border-box;
    margin-top:5px;
}

textarea{
    height:180px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#4CAF50;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#43a047;
}

#status{
    margin-top:15px;
    text-align:center;
}

</style>
</head>
<body>

<div class="mailbox-container">

<h2>📬 匿名信箱</h2>

<form id="mailForm">

<label>主題</label>
<input
type="text"
name="subject"
required>

<label>內容</label>
<textarea
name="message"
required></textarea>

<button type="submit">
送出匿名信
</button>

</form>

<div id="status"></div>

</div>

<script>

const form = document.getElementById("mailForm");

form.addEventListener("submit", async (e)=>{

e.preventDefault();

const status = document.getElementById("status");

status.innerHTML = "發送中...";

const formData = new FormData(form);

try{

const response = await fetch(
"https://你的-render網址.onrender.com/send_email",
{
method:"POST",
body:formData
}
);

if(response.ok){

status.innerHTML = "✅ 匿名信已送出";
form.reset();

}else{

status.innerHTML = "❌ 發送失敗";

}

}catch(error){

status.innerHTML = "❌ 無法連接伺服器";

}

});

</script>

</body>
</html>
